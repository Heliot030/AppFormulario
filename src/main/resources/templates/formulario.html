<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Heliot - Registro</title>
    <style>
        /* Restablecer márgenes y paddings por defecto */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Estilo general del cuerpo de la página (Fondo oscuro) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor principal del formulario */
        .heliot-form-container {
            background-color: #334155; /* Gris azulado oscuro */
            padding: 35px 40px;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5); /* Sombra más pronunciada */
            width: 100%;
            max-width: 450px;
        }

        .heliot-form-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #f8fafc; /* Texto de título claro */
            font-size: 24px;
        }

        /* Grupos de inputs (Etiqueta + Campo) */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1; /* Texto de etiquetas en gris claro */
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #475569; /* Borde sutil oscuro */
            border-radius: 6px;
            font-size: 15px;
            color: #f8fafc; /* Texto del input en blanco/claro */
            transition: all 0.3s ease;
            background-color: #0f172a; /* Fondo del input muy oscuro */
        }

        /* Color del texto de ejemplo (placeholder) */
        .form-group input::placeholder {
            color: #64748b;
        }

        /* Efecto al hacer clic en los campos de texto */
        .form-group input:focus {
            border-color: #3b82f6;
            background-color: #1e293b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        /* Estilo del botón de envío */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6; /* Azul brillante que resalta en fondo oscuro */
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        /* Efecto hover y active del botón */
        .submit-btn:hover {
            background-color: #2563eb; /* Azul un poco más oscuro al pasar el mouse */
        }

        .submit-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="heliot-form-container">
    <h2>Registro</h2>
    <form action="#" method="POST">

        <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" required placeholder="tu@email.com">
        </div>

        <button type="submit" class="submit-btn">Registro</button>

    </form>
</div>

</body>
</html>
